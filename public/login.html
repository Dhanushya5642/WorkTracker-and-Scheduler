<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Work Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1>Work Tracker</h1>
            <p class="subtitle">Track your work, meet your deadlines</p>
            
            <div id="loginForm" class="auth-form">
                <h2>Login</h2>
                <form onsubmit="handleLogin(event)">
                    <input type="text" id="loginUsername" placeholder="Username" required>
                    <input type="password" id="loginPassword" placeholder="Password" required>
                    <button type="submit">Login</button>
                </form>
                <p class="toggle-auth">Don't have an account? <a href="#" onclick="showSignup()">Sign up</a></p>
            </div>

            <div id="signupForm" class="auth-form" style="display: none;">
                <h2>Sign Up</h2>
                <form onsubmit="handleSignup(event)">
                    <input type="text" id="signupUsername" placeholder="Username" required minlength="3">
                    <input type="email" id="signupEmail" placeholder="Email" required>
                    <input type="password" id="signupPassword" placeholder="Password" required minlength="6">
                    <button type="submit">Sign Up</button>
                </form>
                <p class="toggle-auth">Already have an account? <a href="#" onclick="showLogin()">Login</a></p>
            </div>

            <div id="errorMsg" class="error-msg"></div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
